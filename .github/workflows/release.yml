name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Check for lockfile
        id: lockfile
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "frozen=--frozen-lockfile" >> "$GITHUB_OUTPUT"
          else
            echo "frozen=--no-frozen-lockfile" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: pnpm install ${{ steps.lockfile.outputs.frozen }}

      - name: Build
        run: pnpm build

      # Publishes only when an NPM_TOKEN secret is configured. Until then the
      # release still tags + creates a GitHub Release; add the secret to enable
      # automatic npm publishing on the next tag.
      - name: Publish to npm
        if: ${{ secrets.NPM_TOKEN != '' }}
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
