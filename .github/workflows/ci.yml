name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Check for lockfile
        id: lockfile
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "frozen=--frozen-lockfile" >> "$GITHUB_OUTPUT"
          else
            echo "frozen=--no-frozen-lockfile" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: pnpm install ${{ steps.lockfile.outputs.frozen }}

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      # Storybook 10 requires Node >=20.19; the shipped library itself builds on
      # Node 18, so only run the Storybook build on modern Node.
      - name: Build Storybook
        if: ${{ matrix.node-version != 18 }}
        run: pnpm build-storybook
